<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="icons/icon48.png" alt="Icon" width="24" height="24">
            <h2>Beacon</h2>
        </div>

        <div class="section shortcut-section">
            <p class="section-title">Shortcut to Add Highlight:</p>
            <div class="shortcut-display" id="shortcut-display">Loading...</div>
            <a href="#" id="open-shortcuts" class="shortcut-link">Customize Shortcuts</a>
        </div>

        <div class="section theme-section">
            <p class="section-title">Highlight Theme:</p>
            <div class="theme-options">
                <label class="theme-option">
                    <input type="radio" name="theme" value="vibrant" checked>
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: linear-gradient(135deg, #FF9A9E, #FECFEF);"></div>
                            <div class="color-dot" style="background: linear-gradient(135deg, #84FAB0, #8FD3F4);"></div>
                            <div class="color-dot" style="background: linear-gradient(135deg, #FFECD2, #FCB69F);"></div>
                            <div class="color-dot" style="background: linear-gradient(135deg, #A18CD1, #FBC2EB);"></div>
                            <div class="color-dot" style="background: linear-gradient(135deg, #89F7FE, #66A6FF);"></div>
                        </div>
                        <span>Vibrant Gradient</span>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme" value="ocean">
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: #37BBC8;"></div>
                            <div class="color-dot" style="background: #0191B4;"></div>
                            <div class="color-dot" style="background: #F8D70E;"></div>
                            <div class="color-dot" style="background: #D2DE18;"></div>
                            <div class="color-dot" style="background: #FE7A15;"></div>
                        </div>
                        <span>Ocean & Gold</span>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme" value="sunset">
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: #F0EAD8;"></div>
                            <div class="color-dot" style="background: #F73668;"></div>
                            <div class="color-dot" style="background: #FF7F75;"></div>
                            <div class="color-dot" style="background: #F73668;"></div>
                            <div class="color-dot" style="background: #021E66;"></div>
                        </div>
                        <span>Berry Sunset</span>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme" value="aurora">
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: #D7B0DB;"></div>
                            <div class="color-dot" style="background: #3A3087;"></div>
                            <div class="color-dot" style="background: #753BA5;"></div>
                            <div class="color-dot" style="background: #6B79CE;"></div>
                            <div class="color-dot" style="background: #EC5955;"></div>
                        </div>
                        <span>Classic Aurora</span>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme" value="pastel">
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: #EE39B2;"></div>
                            <div class="color-dot" style="background: #6979F3;"></div>
                            <div class="color-dot" style="background: #23B0FF;"></div>
                            <div class="color-dot" style="background: #FF9202;"></div>
                            <div class="color-dot" style="background: #FF615E;"></div>
                        </div>
                        <span>Modern Pastel</span>
                    </div>
                </label>

                <label class="theme-option">
                    <input type="radio" name="theme" value="monochrome">
                    <div class="theme-card">
                        <div class="theme-preview">
                            <div class="color-dot" style="background: #333333;"></div>
                            <div class="color-dot" style="background: #777777;"></div>
                            <div class="color-dot" style="background: #999999;"></div>
                            <div class="color-dot" style="background: #BBBBBB;"></div>
                            <div class="color-dot" style="background: #CCCCCC;"></div>
                        </div>
                        <span>Monochrome</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="section actions-section">
            <button id="clear-btn" class="danger-btn">Clear Page Highlights</button>

            <div id="confirm-dialog" class="hidden confirm-dialog">
                <p>Are you sure you want to clear all highlights on the <strong>current active tab</strong>?</p>
                <div class="dialog-actions">
                    <button id="cancel-clear" class="secondary-btn">Cancel</button>
                    <button id="confirm-clear" class="danger-btn">Clear</button>
                </div>
            </div>
        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>

</html>
